<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopix — Профиль</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase.js"></script>
</head>

<body data-title="Shopix — Профиль">
    <header id="header"></header>

    <main>
        <div class="page-header">
            <h2>Профиль</h2>
        </div>
        <div id="profile-info" class="profile-card"></div>
        <div class="section-title">История заказов</div>
        <div id="orders-list"></div>
        <div id="orders-empty" class="empty-state" style="display:none">
            <i class="ti ti-receipt"></i>
            <h3>Заказов пока нет</h3>
            <button class="btn btn-outline" type="button" onclick="location.href='index.html'">В каталог</button>
        </div>
        <button class="btn btn-outline" id="logout-btn" style="margin-top:24px">
            <i class="ti ti-logout"></i> Выйти
        </button>
    </main>

    <script src="js/models.js"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
