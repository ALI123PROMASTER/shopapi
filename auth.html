<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopix — Вход / Регистрация</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="js/backend.js"></script>
</head>

<body data-title="Shopix — Вход / Регистрация">
  <header id="header"></header>

  <main>
    <section class="auth-shell">
      <div class="auth-header">
        <h2>Добро пожаловать</h2>
        <p>Войдите в аккаунт или создайте новый</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="show-login" type="button">Вход</button>
        <button class="auth-tab" id="show-register" type="button">Регистрация</button>
      </div>

      <div id="login-form" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input type="email" id="login-email" class="form-input" placeholder="you@example.com">
          <span class="field-error" id="login-email-error"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Пароль</label>
          <div class="password-wrapper">
            <input type="password" id="login-password" class="form-input" placeholder="••••••">
            <button type="button" class="toggle-password" aria-label="Показать пароль"><i class="ti ti-eye"></i></button>
          </div>
          <span class="field-error" id="login-password-error"></span>
        </div>
        <button class="btn btn-primary" id="login-submit" style="width:100%">Войти в аккаунт</button>
      </div>

      <div id="register-form" class="auth-form" style="display:none">
        <div class="form-group">
          <label class="form-label" for="reg-name">Имя</label>
          <input type="text" id="reg-name" class="form-input" placeholder="Ваше имя">
          <span class="field-error" id="reg-name-error"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email</label>
          <input type="email" id="reg-email" class="form-input" placeholder="you@example.com">
          <span class="field-error" id="reg-email-error"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-password">Пароль</label>
          <div class="password-wrapper">
            <input type="password" id="reg-password" class="form-input" placeholder="Минимум 6 символов">
            <button type="button" class="toggle-password" aria-label="Показать пароль"><i class="ti ti-eye"></i></button>
          </div>
          <span class="field-error" id="reg-password-error"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-confirm">Повторите пароль</label>
          <input type="password" id="reg-confirm" class="form-input" placeholder="••••••">
          <span class="field-error" id="reg-confirm-error"></span>
        </div>
        <button class="btn btn-primary" id="reg-submit" style="width:100%">Создать аккаунт</button>
      </div>

      <div class="auth-footer">
        <p class="muted" style="font-size: 13px">Или продолжите через</p>
        <div class="social-login">
          <button class="social-btn" type="button"><i class="ti ti-brand-google"></i></button>
          <button class="social-btn" type="button"><i class="ti ti-brand-github"></i></button>
          <button class="social-btn" type="button"><i class="ti ti-brand-vk"></i></button>
        </div>
      </div>
    </section>
  </main>

  <script src="js/models.js"></script>
  <script src="js/common.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
