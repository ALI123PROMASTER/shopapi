<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Магазин — Главная</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body data-title="Магазин — Главная">
  <header id="header"></header>

  <main class="container">
    <section class="page-head">
      <h2>Каталог товаров</h2>
      <p>Поиск, фильтры, сортировка, сравнение и добавление в корзину прямо из каталога.</p>
    </section>

    <section class="controls" aria-label="Фильтры и сортировка">
      <input id="search-input" type="search" placeholder="Поиск по названию..." autocomplete="off">
      <select id="sort-select" aria-label="Сортировка">
        <option value="default">Сортировка по умолчанию</option>
        <option value="price-asc">Цена: по возрастанию</option>
        <option value="price-desc">Цена: по убыванию</option>
        <option value="title-asc">Название: А-Я</option>
        <option value="rating-desc">Рейтинг: высокий</option>
      </select>
    </section>

    <section id="category-filters" class="pills" aria-label="Категории"></section>

    <section class="compare-shortcut" id="compare-shortcut"></section>

    <section id="catalog" class="catalog" aria-live="polite"></section>
  </main>

  <script src="js/models.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/catalog.js"></script>
</body>

</html>
