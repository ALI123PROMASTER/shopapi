<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopix — Главная</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="js/backend.js"></script>
</head>

<body data-title="Shopix — Главная">
  <header id="header"></header>

  <main>
    <div class="page-header">
      <h2>Каталог товаров</h2>
      <p>Поиск, фильтры, сортировка, сравнение и добавление в корзину прямо из каталога.</p>
    </div>

    <div class="catalog-controls">
      <div class="search-input-wrap">
        <i class="ti ti-search"></i>
        <input type="text" id="search-input" placeholder="Поиск товаров...">
      </div>
      <select class="sort-select" id="sort-select">
        <option value="">Сортировка</option>
        <option value="price-asc">Цена ↑</option>
        <option value="price-desc">Цена ↓</option>
        <option value="rating">По рейтингу</option>
        <option value="name">По названию</option>
      </select>
    </div>

    <div id="category-filters"></div>
    <div id="catalog" aria-live="polite"></div>
  </main>

  <script src="js/models.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/catalog.js"></script>
</body>

</html>
